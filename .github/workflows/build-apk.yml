name: Build APK - Direct

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install React Native CLI & dependencies
        run: |
          npm install -g eas-cli
          npm install -g expo-cli
      
      - name: Create Web APK wrapper
        run: |
          mkdir -p apk_project
          cd apk_project
          npm init -y
          npm install capacitor @capacitor/core @capacitor/android
          npx cap init HSE Manager com.hsemanager.app
      
      - name: Copy HTML files
        run: |
          cp index.html apk_project/www/ 2>/dev/null || echo "<html><body>HSE Manager</body></html>" > apk_project/www/index.html
          cp -r css apk_project/www/ 2>/dev/null || true
          cp -r js apk_project/www/ 2>/dev/null || true
      
      - name: Add Android
        run: |
          cd apk_project
          npx cap add android
      
      - name: Build APK
        run: |
          cd apk_project/android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Find APK
        run: find apk_project -name "*.apk" -type f
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HSE-Manager.apk
          path: |
            apk_project/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
