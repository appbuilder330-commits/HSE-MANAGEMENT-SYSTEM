name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 30
          build-tools-version: 30.0.3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Install Cordova
        run: npm install -g cordova@11
      
      - name: Create Cordova Project
        run: |
          cordova create hseapp com.example.hsemanager HSEManager
      
      - name: Add Android Platform
        run: |
          cd hseapp
          cordova platform add android@11
      
      - name: Copy Web Files
        run: |
          cd hseapp/www
          rm -rf *
          cd ../../
          cp index.html hseapp/www/ 2>/dev/null || echo "index.html not found"
          cp -r css hseapp/www/ 2>/dev/null || true
          cp -r js hseapp/www/ 2>/dev/null || true
          ls -la hseapp/www/
      
      - name: Build APK Debug
        run: |
          cd hseapp
          cordova build android --debug
      
      - name: Find APK
        run: |
          find hseapp -name "*.apk" -type f
          echo "---"
          ls -lah hseapp/platforms/android/app/build/outputs/apk/debug/
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: HSE-Manager-APK
          path: hseapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
