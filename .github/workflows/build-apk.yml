name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Cordova CLI
        run: npm install -g cordova@12
      
      - name: Create Cordova App
        run: |
          cordova create HSEApp com.hsemanager.app "HSE Manager"
          cd HSEApp
          cordova platform add android@latest
          cd ..
      
      - name: Copy Web Assets
        run: |
          mkdir -p HSEApp/www/css HSEApp/www/js
          if [ -f index.html ]; then cp index.html HSEApp/www/; fi
          if [ -f style.css ] || [ -d css ]; then cp -r css/* HSEApp/www/css/ 2>/dev/null || cp style.css HSEApp/www/css/ 2>/dev/null || true; fi
          if [ -f app.js ] || [ -d js ]; then cp -r js/* HSEApp/www/js/ 2>/dev/null || cp app.js HSEApp/www/js/ 2>/dev/null || true; fi
      
      - name: Build Release APK
        run: |
          cd HSEApp
          cordova build android --release
      
      - name: Find APK File
        run: |
          find HSEApp -name "*.apk" -type f
          ls -lah HSEApp/platforms/android/app/build/outputs/apk/release/
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HSE-Manager-APK
          path: HSEApp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: HSEApp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
