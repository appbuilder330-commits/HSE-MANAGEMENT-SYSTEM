name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Install Cordova
        run: npm install -g cordova@11
      
      - name: Create Cordova Project
        run: |
          cordova create hseapp com.example.hsemanager "HSE Manager"
      
      - name: Add Android Platform
        run: |
          cd hseapp
          cordova platform add android
      
      - name: Copy Web Files
        run: |
          cd hseapp/www
          rm -rf *
          cd ../../
          cp index.html hseapp/www/ 2>/dev/null || echo "index.html not found"
          cp -r css hseapp/www/ 2>/dev/null || echo "css folder not found"
          cp -r js hseapp/www/ 2>/dev/null || echo "js folder not found"
          echo "Web files copied"
      
      - name: Build APK Debug
        run: |
          cd hseapp
          cordova build android --debug
      
      - name: List APK files
        run: find hseapp -name "*.apk" -type f
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HSE-Manager-APK
          path: hseapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
