name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Install Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Create Cordova project
        run: |
          cordova create hse-app com.example.hsemanager "HSE Manager"
          cd hse-app
          cordova platform add android
      
      - name: Copy web files
        run: |
          cp index.html hse-app/www/
          if [ -d css ]; then cp -r css hse-app/www/; fi
          if [ -d js ]; then cp -r js hse-app/www/; fi
          if [ -d assets ]; then cp -r assets hse-app/www/; fi
      
      - name: Build APK
        run: |
          cd hse-app
          cordova build android --release 2>&1 || cordova build android
      
      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HSE-Manager-APK
          path: |
            hse-app/platforms/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
