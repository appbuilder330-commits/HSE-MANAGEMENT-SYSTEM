name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: choco install nsis -y
      - name: Verify NSIS Installation
        run: |
          Get-ChildItem "C:\Program Files (x86)\NSIS" -ErrorAction SilentlyContinue
          Get-ChildItem "C:\Program Files\NSIS" -ErrorAction SilentlyContinue
      - name: Build installer
        run: |
          $nsisPaths = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $nsisExe = $null
          foreach ($path in $nsisPaths) {
            if (Test-Path $path) {
              $nsisExe = $path
              break
            }
          }
          if ($nsisExe) {
            & $nsisExe installer/setup.nsi
          } else {
            Write-Error "makensis.exe not found in any expected location"
            exit 1
          }
      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: installer/HSE-Manager-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
