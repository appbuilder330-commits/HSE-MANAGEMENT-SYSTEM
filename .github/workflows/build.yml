name: Build Windows EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install NSIS
        run: choco install nsis -y
      
      - name: Create simple installer script
        run: |
          $script = @'
          !include "MUI2.nsh"
          !define APP_NAME "HSE Manager"
          !define APP_VERSION "1.0.0"
          
          OutFile "HSE-Manager-Setup.exe"
          InstallDir "$PROGRAMFILES\HSE Manager"
          RequestExecutionLevel admin
          
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
            SetOutPath "$INSTDIR"
            WriteUninstaller "$INSTDIR\uninstall.exe"
            CreateDirectory "$SMPROGRAMS\${APP_NAME}"
            CreateShortCut "$SMPROGRAMS\${APP_NAME}\${APP_NAME}.lnk" "$INSTDIR\index.html"
            MessageBox MB_OK "${APP_NAME} v${APP_VERSION} installed successfully!"
          SectionEnd
          
          Section "Uninstall"
            Delete "$INSTDIR\uninstall.exe"
            RMDir "$INSTDIR"
          SectionEnd
          '@
          $script | Out-File -Encoding ASCII "setup.nsi"
      
      - name: Build EXE with NSIS
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" "setup.nsi"
          if (-not (Test-Path "HSE-Manager-Setup.exe")) {
            Write-Error "Failed to create EXE"
            exit 1
          }
          Write-Host "EXE created successfully!"
          Get-Item "HSE-Manager-Setup.exe" | Format-List Length
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HSE-Manager-Setup
          path: HSE-Manager-Setup.exe
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: HSE-Manager-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
